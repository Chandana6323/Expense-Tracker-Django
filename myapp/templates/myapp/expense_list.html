<!DOCTYPE html>
<html>
<head>
    <title>Expense Tracker</title>
</head>
<body>

<h1>Expense Tracker</h1>

<a href="/add/">Add Expense</a>

<h2>Total Expense: ₹{{ total }}</h2>

<table border="1">

<tr>
    <th>Title</th>
    <th>Category</th>
    <th>Amount</th>
    <th>Date</th>
    <th>Delete</th>
</tr>

{% for expense in expenses %}

<tr>
    <td>{{ expense.title }}</td>
    <td>{{ expense.category }}</td>
    <td>{{ expense.amount }}</td>
    <td>{{ expense.date }}</td>

    <td>
        <a href="/delete/{{ expense.id }}/">
            Delete
        </a>
    </td>
</tr>

{% endfor %}

</table>

</body>
</html>
